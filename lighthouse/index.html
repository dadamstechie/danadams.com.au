<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave us a review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #12241F;
    --ink-soft: #1B342C;
    --ivory: #F4EFE4;
    --ivory-dim: #CFC9B8;
    --brass: #C9A15A;
    --brass-bright: #E3BE7C;
    --sage: #7C9B8C;
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background:
      radial-gradient(circle at 15% -10%, rgba(201,161,90,0.16), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(124,155,140,0.14), transparent 50%),
      var(--ink);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: linear-gradient(180deg, var(--ink-soft), var(--ink));
    border: 1px solid rgba(201,161,90,0.25);
    border-radius: 24px;
    padding: 56px 40px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
  }

  .card::before {
    content: "";
    position: absolute;
    top: -60%;
    left: 50%;
    transform: translateX(-50%);
    width: 140%;
    height: 220px;
    background: radial-gradient(ellipse at center, rgba(201,161,90,0.18), transparent 70%);
    pointer-events: none;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--sage);
    margin: 0 0 18px;
    font-weight: 600;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 500;
    font-size: 34px;
    line-height: 1.2;
    margin: 0 0 14px;
    color: var(--ivory);
    letter-spacing: -0.01em;
  }

  p.sub {
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--ivory-dim);
    margin: 0 auto 34px;
    max-width: 340px;
  }

  /* Star rating — the signature element */
  .stars {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 38px;
  }

  .stars svg {
    width: 34px;
    height: 34px;
    cursor: pointer;
    transform-origin: center;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  }

  .stars svg path {
    fill: transparent;
    stroke: var(--brass);
    stroke-width: 1.4;
    transition: fill 0.35s ease, stroke 0.35s ease;
  }

  .stars svg.lit path {
    fill: var(--brass-bright);
    stroke: var(--brass-bright);
  }

  .stars svg:hover {
    transform: translateY(-3px) scale(1.06);
  }

  .comment-block {
    text-align: left;
    margin-bottom: 22px;
  }

  .comment-label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--sage);
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }

  .comment-label span {
    font-weight: 400;
    color: rgba(207,201,184,0.55);
  }

  .comment-box {
    width: 100%;
    resize: vertical;
    min-height: 92px;
    background: rgba(244,239,228,0.05);
    border: 1px solid rgba(201,161,90,0.3);
    border-radius: 12px;
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    line-height: 1.55;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .comment-box:focus {
    border-color: var(--brass-bright);
    background: rgba(244,239,228,0.08);
  }

  .comment-box::placeholder { color: rgba(207,201,184,0.4); }

  .char-count {
    text-align: right;
    font-size: 11.5px;
    color: rgba(207,201,184,0.45);
    margin-top: 6px;
  }

  .cta {
    border: none;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--brass);
    color: var(--ink);
    text-decoration: none;
    font-weight: 600;
    font-size: 15.5px;
    padding: 15px 30px;
    border-radius: 999px;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    box-shadow: 0 12px 30px -12px rgba(201,161,90,0.55);
  }

  .cta:hover {
    background: var(--brass-bright);
    transform: translateY(-2px);
    box-shadow: 0 16px 36px -12px rgba(227,190,124,0.6);
  }

  .cta:active { transform: translateY(0); }

  .cta svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .footnote {
    margin-top: 26px;
    font-size: 12.5px;
    color: rgba(207,201,184,0.55);
    letter-spacing: 0.01em;
  }

  @media (prefers-reduced-motion: reduce) {
    .stars svg, .cta { transition: none; }
  }

  @media (max-width: 400px) {
    .card { padding: 44px 26px 36px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>

  <div class="card">
    <p class="eyebrow">Thank you for stopping by</p>
    <h1>How was your&nbsp;experience?</h1>
    <p class="sub">If you enjoyed your visit, a quick review helps others find us — and takes less than a minute.</p>

    <div class="stars" id="stars" aria-label="5 star rating, click to leave a review">
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5.1 4.6 1.5 6.7L12 17.6 6 20.7l1.5-6.7-5.1-4.6 6.8-.7z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5.1 4.6 1.5 6.7L12 17.6 6 20.7l1.5-6.7-5.1-4.6 6.8-.7z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5.1 4.6 1.5 6.7L12 17.6 6 20.7l1.5-6.7-5.1-4.6 6.8-.7z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5.1 4.6 1.5 6.7L12 17.6 6 20.7l1.5-6.7-5.1-4.6 6.8-.7z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5.1 4.6 1.5 6.7L12 17.6 6 20.7l1.5-6.7-5.1-4.6 6.8-.7z"/></svg>
    </div>

    <div class="comment-block">
      <label for="comment" class="comment-label">Your comment <span>— feel free to edit it</span></label>
      <textarea id="comment" class="comment-box" maxlength="600" rows="4">My baby sitter Dan was reliable, flexible and punctual. Would definitely reccommend Lighthouse Sitters!</textarea>
      <div class="char-count"><span id="charCount">0</span>/600</div>
    </div>

    <button class="cta" id="ctaBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21.35 11.1h-9.17v2.92h6.51c-.28 1.68-1.87 4.93-6.51 4.93-3.92 0-7.11-3.25-7.11-7.25s3.19-7.25 7.11-7.25c2.23 0 3.72.95 4.58 1.77l3.12-3.02C17.95 1.24 15.44 0 12.18 0 5.98 0 1 5.05 1 11.25s4.98 11.25 11.18 11.25c6.45 0 10.73-4.53 10.73-10.91 0-.73-.08-1.29-.18-1.85z" fill="#12241F"/>
      </svg>
      <span id="ctaLabel">Copy comment &amp; open Google review</span>
    </button>

    <p class="footnote" id="footnote">We'll copy your comment so you can paste it straight into Google · Opens in a new tab</p>
  </div>

<script>
  const REVIEW_URL = 'https://g.page/r/CXRTahhL0hPaEAE/review';

  const stars = document.querySelectorAll('#stars svg');
  stars.forEach((star, i) => {
    star.addEventListener('mouseenter', () => {
      stars.forEach((s, j) => s.classList.toggle('lit', j <= i));
    });
    star.addEventListener('click', () => {
      copyAndGo();
    });
  });
  document.getElementById('stars').addEventListener('mouseleave', () => {
    stars.forEach(s => s.classList.remove('lit'));
  });

  const commentBox = document.getElementById('comment');
  const charCount = document.getElementById('charCount');

  function updateCount() {
    charCount.textContent = commentBox.value.length;
  }
  updateCount();
  commentBox.addEventListener('input', updateCount);

  async function copyAndGo() {
    const text = commentBox.value.trim();
    const btn = document.getElementById('ctaBtn');
    const label = document.getElementById('ctaLabel');
    const footnote = document.getElementById('footnote');

    try {
      if (text) {
        await navigator.clipboard.writeText(text);
        label.textContent = 'Copied — opening Google…';
        footnote.textContent = 'Your comment is on the clipboard — just paste it into the review box on Google.';
      }
    } catch (err) {
      footnote.textContent = 'Select and copy your comment above, then paste it on the next page.';
    }

    window.open(REVIEW_URL, '_blank', 'noopener');

    setTimeout(() => {
      label.textContent = 'Copy comment & open Google review';
    }, 2600);
  }

  document.getElementById('ctaBtn').addEventListener('click', copyAndGo);
</script>

</body>
</html>
